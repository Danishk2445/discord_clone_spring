server:
  port: ${PORT:4000}
  servlet:
    session:
      timeout: 30d

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mihord}
    username: ${DB_USER:mihord}
    password: ${DB_PASSWORD:mihord}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never
      table-name: SPRING_SESSION
    timeout: 30d
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  codec:
    max-in-memory-size: 300KB

app:
  cors-origin: ${CORS_ORIGIN:http://localhost:3000}
  upload-root: ${UPLOAD_ROOT:./data/uploads}
  is-prod: ${IS_PROD:false}

logging:
  level:
    org.hibernate.SQL: WARN
    org.springframework.web: INFO
