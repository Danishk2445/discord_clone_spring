services:
  postgres:
    image: postgres:16-alpine
    container_name: mihord-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-mihord}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mihord}
      POSTGRES_DB: ${DB_NAME:-mihord}
    ports:
      - "5432:5432"
    volumes:
      - mihord-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mihord} -d ${DB_NAME:-mihord}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mihord-postgres-data:
